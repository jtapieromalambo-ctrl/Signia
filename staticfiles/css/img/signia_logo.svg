<svg xmlns="http://www.w3.org/2000/svg" width="180" height="48" viewBox="0 0 180 48" role="img">
  <title>Signia — Lenguaje de señas</title>

  <!-- Fondo ícono -->
  <rect x="0" y="0" width="48" height="48" rx="12" fill="#2563EB"/>
  <rect x="0" y="0" width="48" height="48" rx="12" fill="#5b21b6" opacity="0.45"/>

  <!-- Mano letra S (ASL) -->
  <!-- Palma -->
  <rect x="12" y="24" width="26" height="17" rx="5" fill="white"/>
  <!-- Pulgar -->
  <path d="M12 32 Q8 29 9 24 Q11 20 14 22" fill="white"/>
  <!-- Dedos doblados -->
  <rect x="12" y="17" width="6" height="11" rx="3" fill="white"/>
  <rect x="19" y="14" width="6" height="13" rx="3" fill="white"/>
  <rect x="26" y="15" width="6" height="12" rx="3" fill="white"/>
  <rect x="33" y="17" width="6" height="10" rx="3" fill="white"/>

  <!-- Texto Signia -->
  <text x="58" y="32" font-family="'Syne', system-ui, sans-serif" font-weight="800" font-size="26" letter-spacing="-0.5" fill="#2563EB">S</text>
  <text x="76" y="32" font-family="'Syne', system-ui, sans-serif" font-weight="800" font-size="26" letter-spacing="-0.5" fill="#1e293b">ignia</text>
</svg>
