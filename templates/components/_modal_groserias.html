{# templates/components/_modal_groserias.html #}
{# Uso: {% include 'components/_modal_groserias.html' %} #}

<div id="modalGroseria" class="modal-groseria-overlay mg-oculto" role="dialog" aria-modal="true" aria-labelledby="modalGroseriaTitle">
    <div class="modal-groseria-box">

        <button class="modal-groseria-close" id="btnCerrarModal" aria-label="Cerrar">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
            </svg>
        </button>

        <div class="modal-groseria-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"
                 fill="none" stroke="#d97706" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </div>

        <h2 class="modal-groseria-titulo" id="modalGroseriaTitle">Contenido inapropiado detectado</h2>
        <p class="modal-groseria-desc" id="modalGroseriaDesc">
            Signia detectó una palabra o seña inapropiada. Este tipo de contenido no está permitido en la plataforma.
        </p>

        <div class="modal-groseria-badge" id="modalGroseriaBadge">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Detectado: <strong id="modalGroseriaPalabra">—</strong>
        </div>

        <hr class="modal-groseria-divider">

        <div class="modal-groseria-actions">
            <button class="modal-btn-primario" id="btnLimpiar">Entendido</button>
        </div>
    </div>
</div>

<style>
.modal-groseria-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: mgFadeIn 0.2s ease;
}
.modal-groseria-overlay.mg-oculto {
    display: none;
}
@keyframes mgFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
}
@keyframes mgSlideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
}
.modal-groseria-box {
    background: #F8FAFF;
    border: 1px solid #B5D4F4;
    border-radius: 16px;
    width: 420px;
    max-width: 94vw;
    padding: 2rem;
    position: relative;
    animation: mgSlideUp 0.25s ease;
}
.modal-groseria-close {
    position: absolute;
    top: 14px; right: 16px;
    background: none; border: none;
    cursor: pointer;
    color: #378ADD;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
}
.modal-groseria-close:hover { color: #185FA5; }
.modal-groseria-icon {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #eadfd2;
    border: 1.5px solid #ce9049;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.25rem;
}
.modal-groseria-titulo {
    font-size: 18px;
    font-weight: 500;
    color: #0C447C;
    margin: 0 0 8px;
}
.modal-groseria-desc {
    font-size: 14px;
    color: #185FA5;
    line-height: 1.6;
    margin: 0 0 1rem;
}
.modal-groseria-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #debcbcc6;
    color: #dc2626;
    border: 1px solid #de7373;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 8px;
    margin-bottom: 1.5rem;
}
.modal-groseria-divider {
    border: none;
    border-top: 1px solid #B5D4F4;
    margin: 0 0 1.25rem;
}
.modal-groseria-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
}
.modal-btn-primario {
    background: #d64d4d;
    border: none;
    border-radius: 8px;
    padding: 8px 22px;
    font-size: 14px;
    color: #fff;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
}
.modal-btn-primario:hover { background: #d73636; }
</style>
