{% extends 'base.html' %}
{% block title %}Nueva Contraseña{% endblock %}

{% block extra_css %}
<style>
body { background: #E8F3FC; }

.page { max-width: 480px; margin: auto; padding: 4rem 1rem; }

.card {
  background: white;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(37,99,235,0.15);
}

.header {
  background: linear-gradient(135deg,#2563EB,#3B82F6);
  padding: 2rem;
  color: white;
}

.body {
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

input {
  width: 100%;
  padding: 0.8rem;
  border-radius: 12px;
  border: 1.5px solid #DBEAFE;
  background: #F0F7FF;
}

.btn {
  margin-top: 1rem;
  padding: 0.9rem;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg,#2563EB,#3B82F6);
  color: white;
  font-weight: bold;
}

.error {
  background: #FEE2E2;
  padding: 0.7rem;
  border-radius: 8px;
}
</style>
{% endblock %}

{% block content %}
<div class="page">
  <div class="card">

    <div class="header">
      <h1>🔒 Nueva Contraseña</h1>
      <p>Crea una contraseña segura</p>
    </div>

    <div class="body">

      {% for message in messages %}
        <div class="error">{{ message }}</div>
      {% endfor %}

      <form method="POST">
        {% csrf_token %}

        <label>Nueva contraseña</label>
        <input type="password" name="password1" required>

        <label>Confirmar contraseña</label>
        <input type="password" name="password2" required>

        <button class="btn">Guardar contraseña →</button>
      </form>

    </div>
  </div>
</div>
{% endblock %}
