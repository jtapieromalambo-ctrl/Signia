{% extends 'base.html' %}
{% block title %}Signia — Recuperar Contraseña{% endblock %}

{% block extra_css %}
<style>
  :root { --blue-primary: #2563EB; --blue-light: #DBEAFE; --blue-mid: #3B82F6; --bg: #E8F3FC; --white: #FFFFFF; --text-dark: #1E293B; --text-muted: #64748B; --shadow: 0 4px 24px rgba(37,99,235,0.10); }
  body { background: var(--bg); }
  .page { max-width: 480px; margin: 0 auto; padding: 4rem 1.5rem; }
  .card { background: var(--white); border-radius: 24px; box-shadow: var(--shadow); overflow: hidden; }
  .card-header { background: linear-gradient(135deg, var(--blue-primary), var(--blue-mid)); padding: 2rem 2.5rem; position: relative; overflow: hidden; }
  .card-header::before { content: ''; position: absolute; right: -30px; top: -30px; width: 130px; height: 130px; border-radius: 50%; background: rgba(255,255,255,0.1); }
  .card-header h1 { font-size: 1.6rem; font-weight: 700; color: white; position: relative; }
  .card-header p { color: rgba(255,255,255,0.82); font-size: 0.9rem; margin-top: 0.3rem; position: relative; }
  .card-body { padding: 2rem 2.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .field { display: flex; flex-direction: column; gap: 0.4rem; }
  .field label { font-size: 0.82rem; font-weight: 600; color: var(--text-dark); }
  .field input { background: #F0F7FF; border: 1.5px solid var(--blue-light); border-radius: 10px; padding: 0.75rem 1rem; font-family: inherit; font-size: 0.95rem; color: var(--text-dark); outline: none; width: 100%; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--blue-primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
  .btn { background: linear-gradient(135deg, var(--blue-primary), var(--blue-mid)); color: white; border: none; border-radius: 10px; padding: 0.85rem; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; transition: transform 0.15s; }
  .btn:hover { transform: translateY(-1px); }
  .link-volver { display: block; text-align: center; margin-top: 0.75rem; font-size: 0.88rem; color: var(--text-muted); text-decoration: none; }
  .link-volver:hover { color: var(--blue-primary); }
</style>
{% endblock %}

{% block content %}
<div class="page">
  <div class="card">
    <div class="card-header">
      <h1 style="display: flex; align-items: center; gap: 0.6rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-key-round"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>
          Recuperar Contraseña
      </h1>
      <p>Te enviaremos un enlace a tu correo</p>
    </div>
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label>Correo electrónico</label>
          {{ form.email }}
        </div>
        <br>
        <button type="submit" class="btn">Enviar enlace de recuperación</button>
      </form>
      <a href="{% url 'home' %}" class="link-volver" style="display: flex; align-items: center; justify-content: center; gap: 0.4rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          Volver al login
      </a>
    </div>
  </div>
</div>
{% endblock %}
