{% extends 'base.html' %}
{% block title %}Recuperar Contraseña{% endblock %}

{% block extra_css %}
<style>
body { background: #E8F3FC; }

.page { max-width: 480px; margin: auto; padding: 4rem 1rem; }

.card {
  background: white;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(37,99,235,0.15);
}

.header {
  background: linear-gradient(135deg,#2563EB,#3B82F6);
  padding: 2rem;
  color: white;
}

.body {
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

input {
  width: 100%;
  padding: 0.8rem;
  border-radius: 12px;
  border: 1.5px solid #DBEAFE;
  background: #F0F7FF;
}

.btn {
  margin-top: 1rem;
  padding: 0.9rem;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg,#2563EB,#3B82F6);
  color: white;
  font-weight: bold;
  width: 100%;
  cursor: pointer;
}

.error   { background: #FEE2E2; padding: 0.7rem; border-radius: 8px; }
.success { background: #DCFCE7; padding: 0.7rem; border-radius: 8px; }

.volver { text-align: center; margin-top: 1rem; }
.volver a { color: #2563EB; text-decoration: none; font-size: 0.9rem; }
</style>
{% endblock %}

{% block content %}
<div class="page">
  <div class="card">

    <div class="header">
      <h1 style="display: flex; align-items: center; gap: 0.6rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-key-round"><path d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>
          Recuperar Contraseña
      </h1>
      <p>Te enviaremos un código a tu correo</p>
    </div>

    <div class="body">

      {% for message in messages %}
        <div class="{% if message.tags == 'success' %}success{% else %}error{% endif %}">
          {{ message }}
        </div>
      {% endfor %}

      <form method="POST">
        {% csrf_token %}
        <label>Correo electrónico</label>
        <input type="email" name="email" placeholder="tucorreo@gmail.com" required>
        <button class="btn" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
            Enviar código
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </form>

      <div class="volver">
        <a href="{% url 'home' %}" style="display: flex; align-items: center; justify-content: center; gap: 0.4rem;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
            Volver al login
        </a>
      </div>

    </div>
  </div>
</div>
{% endblock %}
