{% extends 'base.html' %}
{% block title %}Verificar Código{% endblock %}

{% block extra_css %}
<style>
body { background: #E8F3FC; }

.page { max-width: 480px; margin: auto; padding: 4rem 1rem; }

.card {
  background: white;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(37,99,235,0.15);
}

.header {
  background: linear-gradient(135deg,#2563EB,#3B82F6);
  padding: 2rem;
  color: white;
}

.body {
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

input {
  width: 100%;
  padding: 1rem;
  text-align: center;
  font-size: 1.5rem;
  letter-spacing: 6px;
  border-radius: 12px;
  border: 1.5px solid #DBEAFE;
  background: #F0F7FF;
}

.btn {
  margin-top: 1rem;
  padding: 0.9rem;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg,#2563EB,#3B82F6);
  color: white;
  font-weight: bold;
}

.error {
  background: #FEE2E2;
  padding: 0.7rem;
  border-radius: 8px;
}
</style>
{% endblock %}

{% block content %}
<div class="page">
  <div class="card">

    <div class="header">
      <h1>🔐 Verificar Código</h1>
      <p>Ingresa el código enviado a tu correo</p>
    </div>

    <div class="body">

      {% for message in messages %}
        <div class="error">{{ message }}</div>
      {% endfor %}

      <form method="POST">
        {% csrf_token %}
        <input type="text" name="codigo" placeholder="123456" required>

        <button class="btn">Verificar código →</button>
      </form>

    </div>
  </div>
</div>
{% endblock %}
