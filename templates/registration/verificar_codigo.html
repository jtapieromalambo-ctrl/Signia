{% extends 'base.html' %}
{% block title %}Verificar Código{% endblock %}

{% block extra_css %}
<style>
.page { max-width: 480px; margin: auto; padding: 4rem 1rem; }

.card {
  background: white;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(37,99,235,0.15);
}

.header {
  background: linear-gradient(135deg,#2563EB,#3B82F6);
  padding: 2rem;
  color: white;
  text-align: center;
}

.header h1 { font-size: 1.6rem; margin-bottom: 0.4rem; }
.header p  { opacity: 0.88; font-size: 0.95rem; margin: 0; }

.body {
  padding: 2rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.codigo-input {
  width: 100%;
  padding: 1rem;
  text-align: center;
  font-size: 2rem;
  letter-spacing: 14px;
  border-radius: 14px;
  border: 2px solid #DBEAFE;
  background: #F0F7FF;
  box-sizing: border-box;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  font-family: 'Poppins', monospace;
  color: #1E293B;
}

.codigo-input:focus {
  border-color: #2563EB;
  background: #EFF6FF;
}

.btn-verificar {
  width: 100%;
  padding: 0.9rem;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg,#2563EB,#3B82F6);
  color: white;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  transition: opacity 0.2s;
}

.btn-verificar:hover { opacity: 0.9; }

.btn-volver {
  display: block;
  width: 100%;
  padding: 0.85rem;
  border-radius: 12px;
  background: #F1F5F9;
  color: #475569;
  font-size: 0.95rem;
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  font-family: 'Poppins', sans-serif;
  box-sizing: border-box;
  transition: background 0.2s;
}

.btn-volver:hover { background: #E2E8F0; }

.error {
  background: #FEE2E2;
  color: #991B1B;
  padding: 0.7rem 1rem;
  border-radius: 8px;
  font-size: 0.9rem;
}
</style>
{% endblock %}

{% block content %}
<div class="page">
  <div class="card">

    <div class="header">
      <h1 style="display: flex; align-items: center; justify-content: center; gap: 0.6rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock-keyhole"><circle cx="12" cy="16" r="1"/><rect x="3" y="10" width="18" height="12" rx="2"/><path d="M7 10V7a5 5 0 0 1 10 0v3"/></svg>
          Verificar Código
      </h1>
      <p>Ingresa el código enviado a tu correo</p>
    </div>

    <div class="body">

      {% for message in messages %}
        <div class="error">{{ message }}</div>
      {% endfor %}

      <form method="POST">
        {% csrf_token %}
        <input type="text" id="codigo-input" name="codigo"
               class="codigo-input"
               placeholder="1 2 3 4 5 6"
               maxlength="6" minlength="6"
               inputmode="numeric" pattern="[0-9]{6}"
               autocomplete="one-time-code"
               required autofocus>

        <div style="display:flex; flex-direction:column; gap:0.75rem; margin-top:1.25rem;">
          <button type="submit" class="btn-verificar" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
              Verificar código
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
          <a href="{% url 'home' %}" class="btn-volver" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
              Volver al login
          </a>
        </div>
      </form>

    </div>
  </div>
</div>

<script>
  const input = document.getElementById('codigo-input');

  // Solo números
  input.addEventListener('input', function () {
    this.value = this.value.replace(/[^0-9]/g, '');
  });

  input.addEventListener('keypress', function (e) {
    if (!/[0-9]/.test(e.key)) e.preventDefault();
  });
</script>
{% endblock %}
