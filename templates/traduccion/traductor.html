{% extends 'base.html' %}
{% load static %}

{% block title %}Traductor de Señas — Signia{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/traduccion/traductor.css' %}">
{% endblock %}

{% block content %}
<h1 class="titulo-seccion">Habla o Escribe</h1>

<form class="con" method="POST" enctype="multipart/form-data" id="formulario">
    {% csrf_token %}
    <label for="palabra">Palabra</label>

    <div class="input-group">
        <input type="text" name="palabra" id="palabra" placeholder="Escribe una o varias palabras...">
        <button type="submit" class="btn-lupa">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </button>
    </div>

    <input type="file" name="audio" id="audioInput" style="display:none">

    <div class="video" id="contenedorVideo">
        {% if video_base %}
            <video id="videoBase" width="100%" autoplay muted loop playsinline preload="auto">
                <source src="{{ video_base.video.url }}" type="video/mp4">
            </video>
        {% else %}
            <span class="video-placeholder">Sin video base</span>
        {% endif %}

        <!-- Video A: primer buffer -->
        <video id="videoA" width="100%" muted playsinline preload="auto" style="display:none"></video>

        <!-- Video B: segundo buffer (double buffering) -->
        <video id="videoB" width="100%" muted playsinline preload="auto" style="display:none"></video>
    </div>

    <button type="button" id="btnMic" class="btn-mic">🎤 Hablar</button>
</form>

<script>
    // ─── COLA DE VIDEOS ───────────────────────────────────────────────
    const colaVideos = [
        {% for url in urls_videos %}
            "{{ url }}",
        {% endfor %}
    ];

    // ─── REFERENCIAS AL DOM ───────────────────────────────────────────
    const videoBase = document.getElementById('videoBase');
    const videoA    = document.getElementById('videoA');
    const videoB    = document.getElementById('videoB');

    // ─── DOUBLE BUFFERING ─────────────────────────────────────────────
    let activo       = videoA;
    let siguiente    = videoB;
    let indiceActual = 0;

    // ─── FUNCIÓN PRINCIPAL: reproducirSiguiente() ─────────────────────
    function reproducirSiguiente() {

        if (indiceActual < colaVideos.length) {

            siguiente.src = colaVideos[indiceActual];
            siguiente.load();

            siguiente.oncanplay = () => {

                // Oculta el video base solo cuando el primer video ya está listo
                if (indiceActual === 0 && videoBase) {
                    videoBase.style.display = 'none';
                }

                activo.style.display = 'none';
                activo.pause();

                siguiente.style.display = 'block';
                siguiente.play().catch(() => {
                    setTimeout(() => siguiente.play().catch(() => {}), 300);
                });

                // Swap de roles entre buffers
                [activo, siguiente] = [siguiente, activo];
                indiceActual++;

                // Precarga el próximo video en segundo plano
                if (indiceActual < colaVideos.length) {
                    siguiente.src = colaVideos[indiceActual];
                    siguiente.load();
                }
            };

        } else {
            // ─── COLA TERMINADA: vuelve al video base ─────────────────
            indiceActual = 0;
            activo.style.display = 'none';
            activo.pause();

            if (videoBase) {
                videoBase.style.display = 'block';
                videoBase.play().catch(() => {});
            }
        }
    }

    // ─── EVENTOS "ENDED" ──────────────────────────────────────────────
    videoA.addEventListener('ended', reproducirSiguiente);
    videoB.addEventListener('ended', reproducirSiguiente);

    // Arranca si Django ya envió videos (búsqueda por texto)
    if (colaVideos.length > 0) reproducirSiguiente();


    // ─── MICRÓFONO ────────────────────────────────────────────────────
    const btnMic     = document.getElementById('btnMic');
    const formulario = document.getElementById('formulario');
    let mediaRecorder;
    let grabando   = false;
    let chunks     = [];
    let procesando = false;

    btnMic.addEventListener('click', async () => {

        if (procesando) return;

        if (!grabando) {
            // ── INICIO DE GRABACIÓN ───────────────────────────────────
            chunks = [];

            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) chunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                procesando = true;

                const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
                const formData = new FormData(formulario);
                formData.append('audio', blob, 'audio.webm');

                btnMic.textContent = '⏳ Procesando...';
                btnMic.disabled = true;

                fetch(window.location.href, { method: 'POST', body: formData })
                .then(res => res.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const scriptNuevo = doc.querySelector('script');

                    if (scriptNuevo) {
                        const contenido = scriptNuevo.textContent;
                        const match = contenido.match(/const colaVideos = \[([\s\S]*?)\];/);

                        if (match) {
                            const urlsTexto = match[1].trim();
                            const nuevasColas = urlsTexto
                                .split(',')
                                .map(s => s.trim().replace(/"/g, ''))
                                .filter(s => s.length > 0);

                            if (nuevasColas.length > 0) {
                                indiceActual = 0;
                                colaVideos.length = 0;
                                nuevasColas.forEach(url => colaVideos.push(url));

                                // Reset limpio de buffers antes de reproducir
                                activo.pause();
                                activo.style.display   = 'none';
                                activo.oncanplay       = null;
                                siguiente.oncanplay    = null;

                                // Reinicia roles desde cero
                                activo    = videoA;
                                siguiente = videoB;

                                reproducirSiguiente();
                            }
                        }
                    }

                    btnMic.textContent = '🎤 Hablar';
                    btnMic.disabled    = false;
                    procesando         = false;
                })
                .catch(() => {
                    btnMic.textContent = '🎤 Hablar';
                    btnMic.disabled    = false;
                    procesando         = false;
                });
            };

            mediaRecorder.start(100);
            grabando = true;
            btnMic.textContent = '⏹ Detener';

        } else {
            // ── DETENER GRABACIÓN ─────────────────────────────────────
            mediaRecorder.stop();
            grabando = false;
            btnMic.textContent = '🎤 Hablar';
        }
    });
</script>
{% endblock %}
