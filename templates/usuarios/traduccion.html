{% extends 'base.html' %}
{% load static %}

{% block title %}Signia — Traductor{% endblock %}

{% block extra_css %}
<style>
    :root {
        --blue-primary: #2563EB;
        --blue-light: #DBEAFE;
        --blue-mid: #3B82F6;
        --bg: #E8F3FC;
        --white: #FFFFFF;
        --text-dark: #1E293B;
        --text-muted: #64748B;
        --shadow: 0 4px 24px rgba(37,99,235,0.10);
    }

    body { background: var(--bg); }

    .page { max-width: 860px; margin: 0 auto; padding: 4rem 1.5rem; }

    .card { background: var(--white); border-radius: 24px; box-shadow: var(--shadow); overflow: hidden; }

    .card-header {
        background: linear-gradient(135deg, var(--blue-primary), var(--blue-mid));
        padding: 2rem 2.5rem; color: white;
    }
    .card-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.3rem; }
    .card-header p { color: rgba(255,255,255,0.82); font-size: 0.95rem; }

    .card-body { padding: 2.5rem; display: flex; flex-direction: column; gap: 1.25rem; }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field label { font-size: 0.88rem; font-weight: 600; color: var(--text-dark); }
    .field textarea {
        background: #F0F7FF; border: 1.5px solid #BFDBFE; border-radius: 12px;
        padding: 0.85rem 1rem; font-family: inherit; font-size: 0.95rem;
        color: var(--text-dark); outline: none; resize: none; height: 140px;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field textarea:focus {
        border-color: var(--blue-primary);
        box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    .avatar-area {
        background: #F0F7FF; border: 2px dashed #BFDBFE; border-radius: 16px;
        min-height: 220px; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 0.75rem; color: var(--text-muted);
    }
    .avatar-area .emoji { font-size: 3.5rem; }
    .avatar-area p { font-size: 0.9rem; font-weight: 500; }

    .btn {
        background: linear-gradient(135deg, var(--blue-primary), var(--blue-mid));
        color: white; border: none; border-radius: 12px; padding: 0.85rem 2rem;
        font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer;
        box-shadow: 0 4px 14px rgba(37,99,235,0.35);
        transition: transform 0.15s, box-shadow 0.15s;
        align-self: flex-start;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.45); }
</style>
{% endblock %}

{% block content %}
<div class="page">
    <div class="card">
        <div class="card-header">
            <h1>
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hand" style="vertical-align: sub; margin-right: 8px;"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>
                Traductor de Señas
            </h1>
            <p>Escribe un texto y el avatar lo traducirá a lenguaje de señas colombiano</p>
        </div>
        <div class="card-body">
            <div class="field">
                <label>Texto a traducir</label>
                <textarea placeholder="Escribe aquí el texto que quieres traducir a señas..."></textarea>
            </div>
            <button class="btn" style="display: flex; align-items: center; gap: 0.5rem;">
                Traducir a señas
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-right"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
            <div class="avatar-area">
                <div class="avatar-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#BFDBFE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hand"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>
                </div>
                <p>El avatar aparecerá aquí</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
